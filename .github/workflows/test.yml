name: 🧪 Test
on: [push]

jobs:
  test:
    name: Run test suites
    runs-on: ubuntu-latest

    steps:
      - name: 🗳️ Checkout repo
        uses: actions/checkout@v6

      - name: 🔧 Setup Node 24.x
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧑‍🔬 Test
        run: npm run test
